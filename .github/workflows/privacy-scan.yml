name: Privacy scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  privacy-scan:
    name: Scan for private paths and PII
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run privacy scan on changed files
        run: |
          chmod +x scripts/check-privacy.sh
          bash scripts/check-privacy.sh --diff ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
